<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #17274D; color: #e2e8f0; min-height: 100vh; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
:root {
  --blue: #0091EA;
  --blue-hover: #0077c2;
  --green: #00c853;
  --gray: #94a3b8;
  --border: #2a3f6f;
  --surface: #1e3160;
  --surface2: #243872;
  --white: #e2e8f0;
  --sidebar-w: 280px;
}
/* ── Header ── */
#header {
  background: #1e3160;
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
#header .logo { font-weight: 700; font-size: 1.15rem; color: var(--blue); cursor: pointer; }
#header .header-right { display: flex; align-items: center; gap: 12px; }
#user-info { font-size: .85rem; color: var(--gray); }
.btn-icon { background: none; border: none; font-size: 1.2rem; padding: 4px 8px; border-radius: 6px; color: var(--white); }
.btn-icon:hover { background: var(--surface2); }
.btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: .9rem; font-weight: 500; }
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: var(--blue-hover); }
.btn-outline { background: transparent; color: var(--blue); border: 1.5px solid var(--blue); }
.btn-outline:hover { background: rgba(0,145,234,.12); }
.btn-sm { padding: 5px 12px; font-size: .82rem; }
/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }
/* ── Landing ── */
#page-landing {
  display: none;
  position: relative;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 52px);
  flex-direction: column;
  gap: 20px;
  text-align: center;
  background: #17274D;
}
#page-landing.active { display: flex; }
#particles-js { position: absolute; inset: 0; z-index: 0; }
#landing-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 20px; }
#page-landing h1 { font-size: 2.4rem; color: #fff; text-shadow: 0 2px 16px rgba(0,145,234,.4); }
#page-landing p { color: var(--gray); font-size: 1rem; }
/* ── Home ── */
#page-home { padding: 24px 16px; max-width: 900px; margin: 0 auto; }
#page-home h2 { font-size: 1.2rem; margin-bottom: 16px; color: var(--white); }
.course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.course-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  cursor: pointer;
  transition: box-shadow .15s, border-color .15s;
}
.course-card:hover { box-shadow: 0 2px 16px rgba(0,145,234,.2); border-color: var(--blue); }
.course-card h3 { font-size: 1rem; margin-bottom: 10px; color: var(--white); }
.progress-bar { background: var(--surface2); border-radius: 99px; height: 7px; overflow: hidden; margin-bottom: 6px; }
.progress-fill { background: var(--green); height: 100%; border-radius: 99px; transition: width .3s; }
.progress-label { font-size: .8rem; color: var(--gray); }
/* ── Course page ── */
#page-course { display: none; }
#page-course.active { display: flex; min-height: calc(100vh - 52px); }
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: #1a2d55;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.sidebar-title { padding: 4px 14px 10px; font-weight: 600; font-size: .95rem; border-bottom: 1px solid var(--border); margin-bottom: 6px; color: var(--white); }
.tree-label {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  font-size: .875rem;
  cursor: pointer;
  user-select: none;
  color: #cbd5e1;
}
.tree-label:hover { background: var(--surface2); }
.tree-label.active-lesson { background: rgba(0,145,234,.18); color: #60c8ff; font-weight: 500; }
.tree-label .icon { font-size: .7rem; width: 14px; text-align: center; flex-shrink: 0; color: var(--gray); }
.tree-label .check { color: var(--green); font-size: .8rem; flex-shrink: 0; }
.tree-children { display: none; }
.tree-children.open { display: block; }
.course-main { flex: 1; padding: 24px; overflow-y: auto; color: var(--gray); }
/* ── Lesson page ── */
#page-lesson { display: none; }
#page-lesson.active { display: flex; min-height: calc(100vh - 52px); }
.lesson-main { flex: 1; padding: 24px; overflow-y: auto; max-width: 860px; }
.lesson-main h2 { font-size: 1.15rem; margin-bottom: 16px; color: var(--white); }
.video-wrap {
  position: relative; padding-bottom: 56.25%; background: #000;
  border-radius: 10px; overflow: hidden; margin-bottom: 18px;
}
.video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.video-wrap::after {
  content: ''; position: absolute; top: 0; right: 0;
  width: 160px; height: 44px; background: #000; z-index: 2; pointer-events: none;
}
.no-video { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: .9rem; }
.watch-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.btn-watch { padding: 8px 20px; border-radius: 8px; border: 1.5px solid var(--green); background: transparent; color: var(--green); font-weight: 500; font-size: .9rem; }
.btn-watch.watched { background: var(--green); color: #fff; }
.docs-section h3 { font-size: .78rem; margin-bottom: 10px; color: var(--gray); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.doc-list { display: flex; flex-direction: column; gap: 8px; }
.doc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.doc-card span { font-size: .875rem; color: #cbd5e1; }
/* ── Admin panel ── */
#admin-panel {
  position: fixed; top: 60px; right: 16px;
  background: #1e3160;
  border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; min-width: 260px;
  box-shadow: 0 4px 24px rgba(0,0,0,.5); z-index: 200; display: none;
}
#admin-panel.open { display: block; }
#admin-panel h4 { margin-bottom: 10px; font-size: .95rem; color: var(--white); }
#admin-panel p { font-size: .82rem; color: var(--gray); margin-bottom: 12px; }
#admin-panel input {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--white); border-radius: 6px; padding: 5px 8px; font-size: .82rem;
}
#admin-panel input::placeholder { color: var(--gray); }
/* ── Loading ── */
#loading { display: none; position: fixed; inset: 0; background: rgba(23,39,77,.8); align-items: center; justify-content: center; z-index: 999; font-size: 1rem; color: var(--gray); }
#loading.show { display: flex; }
/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #17274D; }
::-webkit-scrollbar-thumb { background: #2a3f6f; border-radius: 3px; }
/* ── Mobile ── */
@media (max-width: 640px) {
  .sidebar { width: 220px; min-width: 220px; }
  .course-grid { grid-template-columns: 1fr; }
}

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
let appData = null, currentUser = null, progress = {};
let currentCourseId = null, currentLessonId = null;
const $ = id => document.getElementById(id);
const showLoad = () => $('loading').classList.add('show');
const hideLoad = () => $('loading').classList.remove('show');

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const p = $('page-' + name);
  if (p) p.classList.add('active');
  if (name === 'landing' && !window._pjsLoaded) {
    window._pjsLoaded = true;
    particlesJS('particles-js', PARTICLES_CONFIG);
  }
}

function navigate(hash, ...args) {
  if (hash === 'home') { window.location.hash = '#home'; renderHome(); showPage('home'); }
  else if (hash === 'course') { const [id] = args; window.location.hash = `#course/${id}`; renderCourse(id); }
  else if (hash === 'lesson') { const [cid, lid] = args; window.location.hash = `#lesson/${cid}/${lid}`; renderLesson(cid, lid); }
}

function handleHash() {
  if (!currentUser || !appData) return;
  const h = window.location.hash;
  if (!h || h === '#home') { navigate('home'); return; }
  const p = h.replace('#','').split('/');
  if (p[0] === 'course' && p[1]) { renderCourse(p[1]); return; }
  if (p[0] === 'lesson' && p[1] && p[2]) { renderLesson(p[1], p[2]); return; }
  navigate('home');
}

function signInGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => alert('Lỗi đăng nhập: ' + e.message));
}
function signOut() { auth.signOut(); }

auth.onAuthStateChanged(async user => {
  if (user) {
    showLoad();
    const allowed = await checkWhitelist(user);
    if (!allowed) {
      await logUnauthorized(user);
      await auth.signOut();
      hideLoad();
      alert(`⛔ Tài khoản ${user.email} không có quyền truy cập.\nLiên hệ quản trị viên để được cấp quyền.`);
      return;
    }
    currentUser = user;
    $('header').style.display = 'flex';
    $('user-info').textContent = user.displayName || user.email;
    if (user.email === ADMIN_EMAIL) $('btn-admin').style.display = '';
    await loadData();
    await loadProgress();
    hideLoad();
    handleHash();
  } else {
    currentUser = null; appData = null; progress = {};
    $('header').style.display = 'none';
    showPage('landing');
  }
});

async function checkWhitelist(user) {
  if (user.email === ADMIN_EMAIL) return true;
  try { const d = await db.collection('whitelist').doc(user.email).get(); return d.exists; }
  catch(e) { console.warn(e); return false; }
}

async function logUnauthorized(user) {
  try {
    await db.collection('security_logs').add({
      email: user.email, name: user.displayName || '',
      time: firebase.firestore.FieldValue.serverTimestamp(), ua: navigator.userAgent
    });
  } catch(e) { console.warn(e); }
}

async function loadData() {
  try {
    const doc = await db.collection('app_data').doc('courses').get();
    appData = doc.exists ? JSON.parse(doc.data().json) : getMockData();
    if ($('admin-last-updated')) $('admin-last-updated').textContent = 'Cập nhật: ' + (appData.lastUpdated || '—');
  } catch(e) { console.warn(e); appData = getMockData(); }
}

async function loadProgress() {
  if (!currentUser) return;
  try {
    const snap = await db.collection('progress').where('userId','==',currentUser.uid).get();
    progress = {};
    snap.forEach(doc => { const d = doc.data(); if (d.watched) progress[d.lessonId] = true; });
  } catch(e) { console.warn(e); }
}

async function saveProgress(lessonId, courseId, watched) {
  if (!currentUser) return;
  try {
    await db.collection('progress').doc(`${currentUser.uid}_${lessonId}`).set({
      userId: currentUser.uid, lessonId, courseId, watched,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) { console.warn(e); }
}

const findCourse = id => appData.courses.find(c => c.id === id);
function getAllLessons(node) {
  if (node.type === 'lesson') return [node];
  return (node.children || []).flatMap(getAllLessons);
}
function findLesson(course, lid) { return course.tree.flatMap(getAllLessons).find(l => l.id === lid); }
function countProgress(course) {
  const all = course.tree.flatMap(getAllLessons);
  return { done: all.filter(l => progress[l.id]).length, total: all.length };
}

function renderHome() {
  showPage('home');
  const grid = $('course-grid'); grid.innerHTML = '';
  appData.courses.forEach(course => {
    const { done, total } = countProgress(course);
    const pct = total ? Math.round(done/total*100) : 0;
    const card = document.createElement('div'); card.className = 'course-card';
    card.innerHTML = `<h3>${course.title}</h3>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${done}/${total} bài · ${pct}%</div>`;
    card.onclick = () => navigate('course', course.id);
    grid.appendChild(card);
  });
}

function buildTree(nodes, courseId, indent, activeId) {
  const ul = document.createElement('div');
  nodes.forEach(node => {
    const wrap = document.createElement('div'); wrap.className = 'tree-node';
    const label = document.createElement('div'); label.className = 'tree-label';
    label.style.paddingLeft = (14 + indent*14) + 'px';
    if (node.type === 'lesson') {
      label.innerHTML = `<span class="icon">📄</span><span style="flex:1">${node.title}</span><span class="check">${progress[node.id]?'✓':''}</span>`;
      if (node.id === activeId) label.classList.add('active-lesson');
      label.onclick = () => navigate('lesson', courseId, node.id);
    } else {
      const ch = document.createElement('div'); ch.className = 'tree-children';
      label.innerHTML = `<span class="icon toggle-icon">▶</span><span>${node.title}</span>`;
      label.onclick = () => { const o = ch.classList.toggle('open'); label.querySelector('.toggle-icon').textContent = o?'▼':'▶'; };
      if (node.children) ch.appendChild(buildTree(node.children, courseId, indent+1, activeId));
      wrap.appendChild(label); wrap.appendChild(ch); ul.appendChild(wrap); return;
    }
    wrap.appendChild(label); ul.appendChild(wrap);
  });
  return ul;
}

function renderCourse(courseId) {
  currentCourseId = courseId; showPage('course');
  const course = findCourse(courseId); if (!course) { navigate('home'); return; }
  $('sidebar-title').textContent = course.title;
  $('sidebar-tree').innerHTML = '';
  $('sidebar-tree').appendChild(buildTree(course.tree, courseId, 0, null));
}

function renderLesson(courseId, lessonId) {
  currentCourseId = courseId; currentLessonId = lessonId; showPage('lesson');
  const course = findCourse(courseId); if (!course) { navigate('home'); return; }
  $('sidebar-lesson-title').textContent = course.title;
  $('sidebar-lesson-tree').innerHTML = '';
  $('sidebar-lesson-tree').appendChild(buildTree(course.tree, courseId, 0, lessonId));
  const lesson = findLesson(course, lessonId); if (!lesson) return;
  $('lesson-title').textContent = lesson.title;
  const vw = $('video-wrap'), nv = $('no-video');
  const old = vw.querySelector('iframe'); if (old) old.remove();
  if (lesson.youtubeId) {
    nv.style.display = 'none';
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${lesson.youtubeId}?rel=0&modestbranding=1&iv_load_policy=3&color=white`;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    vw.appendChild(iframe);
  } else { nv.style.display = 'flex'; }
  updateWatchBtn();
  const dl = $('doc-list'); dl.innerHTML = '';
  if (lesson.documents?.length) {
    lesson.documents.forEach(doc => {
      const card = document.createElement('div'); card.className = 'doc-card';
      card.innerHTML = `<span>📎 ${doc.title}</span><a href="${doc.url}" target="_blank" class="btn btn-outline btn-sm">Mở</a>`;
      dl.appendChild(card);
    });
  } else { dl.innerHTML = '<p style="font-size:.85rem;color:var(--gray)">Không có tài liệu</p>'; }
}

function updateWatchBtn() {
  const btn = $('btn-watch'); if (!btn) return;
  const w = !!progress[currentLessonId];
  btn.textContent = w ? '✓ Đã xem' : 'Đánh dấu đã xem';
  btn.className = 'btn-watch' + (w ? ' watched' : '');
}
async function toggleWatch() {
  if (!currentLessonId || !currentCourseId) return;
  const v = !progress[currentLessonId]; progress[currentLessonId] = v;
  updateWatchBtn(); await saveProgress(currentLessonId, currentCourseId, v);
}

function toggleAdmin() {
  $('admin-panel').classList.toggle('open');
  if ($('admin-panel').classList.contains('open')) loadAdminData();
}
async function loadAdminData() {
  const wl = $('whitelist-list'); wl.innerHTML = 'Đang tải...';
  try {
    const snap = await db.collection('whitelist').get();
    if (snap.empty) { wl.innerHTML = '<i>Chưa có ai</i>'; }
    else {
      wl.innerHTML = '';
      snap.forEach(doc => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:2px 0';
        row.innerHTML = `<span>${doc.id}</span><button onclick="removeWhitelist('${doc.id}')" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:.8rem">✕</button>`;
        wl.appendChild(row);
      });
    }
  } catch(e) { wl.innerHTML = 'Lỗi: ' + e.message; }
  const sl = $('security-logs'); sl.innerHTML = 'Đang tải...';
  try {
    const snap = await db.collection('security_logs').orderBy('time','desc').limit(10).get();
    if (snap.empty) { sl.innerHTML = '<span style="color:var(--green)">Không có truy cập trái phép</span>'; }
    else {
      sl.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data(), t = d.time?.toDate?.()?.toLocaleString('vi-VN') || '—';
        const div = document.createElement('div');
        div.style.cssText = 'padding:2px 0;border-bottom:1px solid #3f1d1d';
        div.textContent = `⚠ ${d.email} — ${t}`;
        sl.appendChild(div);
      });
    }
  } catch(e) { sl.innerHTML = 'Lỗi: ' + e.message; }
}
async function addWhitelist() {
  const input = $('whitelist-input'), email = input.value.trim().toLowerCase();
  if (!email || !email.includes('@')) { alert('Email không hợp lệ'); return; }
  await db.collection('whitelist').doc(email).set({ addedAt: firebase.firestore.FieldValue.serverTimestamp() });
  input.value = ''; loadAdminData();
}
async function removeWhitelist(email) {
  if (!confirm(`Xoá quyền của ${email}?`)) return;
  await db.collection('whitelist').doc(email).delete(); loadAdminData();
}
document.addEventListener('click', e => {
  if (!$('admin-panel').contains(e.target) && e.target !== $('btn-admin')) $('admin-panel').classList.remove('open');
});
async function triggerSync(e) {
  const btn = e.target; btn.disabled = true; btn.textContent = 'Đang sync...';
  try {
    const r = await fetch(SYNC_PROXY_URL, { method: 'POST', headers: { 'x-secret': SYNC_SECRET } });
    if (r.status === 204) alert('✓ Đã trigger sync! GitHub Actions sẽ chạy trong vài giây.');
    else if (r.status === 429) alert('⏳ Vừa sync xong, chờ 1 phút trước khi sync lại.');
    else alert('Lỗi: ' + r.status + '. Kiểm tra Cloudflare Worker.');
  } catch(e) { alert('Lỗi kết nối: ' + e.message); }
  btn.disabled = false; btn.textContent = '🔄 Sync ngay';
}

window.addEventListener('hashchange', handleHash);

function getMockData() {
  return { lastUpdated: new Date().toISOString(), courses: [
    { id:"01-mock", title:"Khóa mẫu", order:1, tree:[
      { id:"01-01", title:"Chương 1", order:1, type:"chapter", children:[
        { id:"01-01-01", title:"Bài 1", order:1, type:"lesson", youtubeId:"", documents:[] }
      ]}
    ]}
  ]};
}
