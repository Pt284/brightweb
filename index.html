<script>
(function() {
  // Container ẩn cần có kích thước thật
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;width:64px;height:64px;opacity:0;pointer-events:none;top:-999px';
  document.body.appendChild(div);

  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 64;

  const link = document.querySelector("link[rel='icon']") || document.createElement('link');
  link.rel = 'icon'; link.type = 'image/png';
  document.head.appendChild(link);

  const anim = lottie.loadAnimation({
    container: div,
    renderer: 'svg', // dùng svg thay canvas cho dễ hơn
    loop: true, autoplay: true,
    path: 'https://fonts.gstatic.com/s/e/notoemoji/latest/1f608/lottie.json',
  });

  // Sau khi load xong mới bắt đầu vẽ
  anim.addEventListener('DOMLoaded', () => {
    let last = 0;
    (function tick(ts) {
      if (ts - last > 100) {
        const svg = div.querySelector('svg');
        if (svg) {
          const xml = new XMLSerializer().serializeToString(svg);
          const img = new Image();
          img.onload = () => {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 64, 64);
            ctx.drawImage(img, 0, 0, 64, 64);
            link.href = canvas.toDataURL('image/png');
          };
          img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(xml)));
        }
        last = ts;
      }
      requestAnimationFrame(tick);
    })(0);
  });
})();
</script>

.page.active { display: block; }
/* ── Landing ── */

.progress-bar { background: #e5e7eb; border-radius: 99px; height: 7px; overflow: hidden; margin-bottom: 6px; }

/* ── Course page ── */
#page-course { display: none; }
#page-course.active { display: flex; min-height: calc(100vh - 52px); }
.sidebar {

.tree-label {

.tree-label .check { color: var(--green); font-size: .8rem; flex-shrink: 0; }

.course-main { flex: 1; padding: 24px; overflow-y: auto; }

// ── Firebase init ──
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
// ── App state ──
let appData     = null;  // data.json
let currentUser = null;
let progress    = {};    // { lessonId: true/false }
let currentCourseId = null;
let currentLessonId = null;
// ── Loading helper ──
const $ = id => document.getElementById(id);
const showLoad = () => $('loading').classList.add('show');
const hideLoad = () => $('loading').classList.remove('show');
// ── Page routing ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const p = $('page-' + name);
  if (p) p.classList.add('active');
}
function navigate(hash, ...args) {
  if (hash === 'home') {
    window.location.hash = '#home';
    renderHome();
    showPage('home');
  } else if (hash === 'course') {
    const [courseId] = args;
    window.location.hash = `#course/${courseId}`;
    renderCourse(courseId);
  } else if (hash === 'lesson') {
    const [courseId, lessonId] = args;
    window.location.hash = `#lesson/${courseId}/${lessonId}`;
    renderLesson(courseId, lessonId);
  }
}
function handleHash() {
  if (!currentUser || !appData) return;
  const h = window.location.hash;
  if (!h || h === '#home') { navigate('home'); return; }
  const parts = h.replace('#','').split('/');
  if (parts[0] === 'course' && parts[1]) { renderCourse(parts[1]); return; }
  if (parts[0] === 'lesson' && parts[1] && parts[2]) { renderLesson(parts[1], parts[2]); return; }
  navigate('home');
}
// ── Auth ──
function signInGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => alert('Lỗi đăng nhập: ' + e.message));
}
function signOut() {
  auth.signOut();
}
auth.onAuthStateChanged(async user => {
  if (user) {
    showLoad();
    // ── Kiểm tra whitelist ──
    const allowed = await checkWhitelist(user);
    if (!allowed) {
      await logUnauthorized(user);
      await auth.signOut();
      hideLoad();
      alert(`⛔ Tài khoản ${user.email} không có quyền truy cập.\nLiên hệ quản trị viên để được cấp quyền.`);
      return;
    }
    currentUser = user;
    $('header').style.display = 'flex';
    $('user-info').textContent = user.displayName || user.email;
    if (user.email === ADMIN_EMAIL) $('btn-admin').style.display = '';
    await loadData();
    await loadProgress();
    hideLoad();
    handleHash();
  } else {
    currentUser = null;
    appData = null;
    progress = {};
    $('header').style.display = 'none';
    showPage('landing');
  }
});
// ── Kiểm tra email có trong whitelist không ──
async function checkWhitelist(user) {
  // Admin luôn được vào
  if (user.email === ADMIN_EMAIL) return true;
  try {
    const doc = await db.collection('whitelist').doc(user.email).get();
    return doc.exists;
  } catch(e) {
    console.warn('Không đọc được whitelist:', e.message);
    return false; // Mặc định từ chối nếu lỗi
  }
}
// ── Ghi log truy cập trái phép → admin thấy trong Firestore ──
async function logUnauthorized(user) {
  try {
    await db.collection('security_logs').add({
      email: user.email,
      name: user.displayName || '',
      time: firebase.firestore.FieldValue.serverTimestamp(),
      ua: navigator.userAgent
    });
  } catch(e) {
    console.warn('Ghi log thất bại:', e.message);
  }
}
// ── Load data từ Firestore (thay vì data.json) ──
async function loadData() {
  try {
    const doc = await db.collection('app_data').doc('courses').get();
    if (doc.exists) {
      appData = JSON.parse(doc.data().json);
    } else {
      appData = getMockData();
    }
    if ($('admin-last-updated')) {
      $('admin-last-updated').textContent = 'Cập nhật: ' + (appData.lastUpdated || '—');
    }
  } catch(e) {
    console.warn('Không đọc được Firestore, dùng mock:', e.message);
    appData = getMockData();
  }
}
// ── Load progress từ Firestore ──
async function loadProgress() {
  if (!currentUser) return;
  try {
    const snap = await db.collection('progress')
      .where('userId', '==', currentUser.uid)
      .get();
    progress = {};
    snap.forEach(doc => {
      const d = doc.data();
      if (d.watched) progress[d.lessonId] = true;
    });
  } catch(e) {
    console.warn('Firestore không khả dụng:', e.message);
  }
}
// ── Firestore: save progress ──
async function saveProgress(lessonId, courseId, watched) {
  if (!currentUser) return;
  const docId = `${currentUser.uid}_${lessonId}`;
  try {
    await db.collection('progress').doc(docId).set({
      userId: currentUser.uid,
      lessonId, courseId,
      watched,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    console.warn('Lưu progress thất bại:', e.message);
  }
}
// ── Helpers: traverse tree ──
function findCourse(courseId) {
  return appData.courses.find(c => c.id === courseId);
}
function getAllLessons(node) {
  if (node.type === 'lesson') return [node];
  if (!node.children) return [];
  return node.children.flatMap(getAllLessons);
}
function findLesson(course, lessonId) {
  const all = course.tree.flatMap(getAllLessons);
  return all.find(l => l.id === lessonId);
}
function countProgress(course) {
  const all = course.tree.flatMap(getAllLessons);
  const done = all.filter(l => progress[l.id]).length;
  return { done, total: all.length };
}
// ── Render: Home ──
function renderHome() {
  showPage('home');
  const grid = $('course-grid');
  grid.innerHTML = '';
  appData.courses.forEach(course => {
    const { done, total } = countProgress(course);
    const pct = total ? Math.round(done / total * 100) : 0;
    const card = document.createElement('div');
    card.className = 'course-card';
    card.innerHTML = `
      <h3>${course.title}</h3>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${done}/${total} bài · ${pct}%</div>
    `;
    card.onclick = () => navigate('course', course.id);
    grid.appendChild(card);
  });
}
// ── Render: Sidebar tree ──
function buildTree(nodes, courseId, indent, activeLessonId) {
  const ul = document.createElement('div');
  nodes.forEach(node => {
    const wrap = document.createElement('div');
    wrap.className = 'tree-node';
    const label = document.createElement('div');
    label.className = 'tree-label';
    label.style.paddingLeft = (14 + indent * 14) + 'px';
    if (node.type === 'lesson') {
      const checked = progress[node.id] ? '✓' : '';
      label.innerHTML = `<span class="icon">📄</span><span style="flex:1">${node.title}</span><span class="check">${checked}</span>`;
      if (node.id === activeLessonId) label.classList.add('active-lesson');
      label.onclick = () => navigate('lesson', courseId, node.id);
    } else {
      // chapter/folder
      const children = document.createElement('div');
      children.className = 'tree-children';
      label.innerHTML = `<span class="icon toggle-icon">▶</span><span>${node.title}</span>`;
      label.onclick = () => {
        const open = children.classList.toggle('open');
        label.querySelector('.toggle-icon').textContent = open ? '▼' : '▶';
      };
      if (node.children) {
        children.appendChild(buildTree(node.children, courseId, indent + 1, activeLessonId));
      }
      wrap.appendChild(label);
      wrap.appendChild(children);
      ul.appendChild(wrap);
      return;
    }
    wrap.appendChild(label);
    ul.appendChild(wrap);
  });
  return ul;
}
// ── Render: Course ──
function renderCourse(courseId) {
  currentCourseId = courseId;
  showPage('course');
  const course = findCourse(courseId);
  if (!course) { navigate('home'); return; }
  $('sidebar-title').textContent = course.title;
  $('sidebar-tree').innerHTML = '';
  $('sidebar-tree').appendChild(buildTree(course.tree, courseId, 0, null));
}
// ── Render: Lesson ──
function renderLesson(courseId, lessonId) {
  currentCourseId = courseId;
  currentLessonId = lessonId;
  showPage('lesson');
  const course = findCourse(courseId);
  if (!course) { navigate('home'); return; }
  // Sidebar
  $('sidebar-lesson-title').textContent = course.title;
  $('sidebar-lesson-tree').innerHTML = '';
  $('sidebar-lesson-tree').appendChild(buildTree(course.tree, courseId, 0, lessonId));
  // Auto-expand active nodes
  document.querySelectorAll('#sidebar-lesson-tree .tree-label.active-lesson').forEach(el => {
    let parent = el.parentElement?.parentElement?.previousElementSibling;
    // expand parents — simple approach: open all tree-children in sidebar
  });
  const lesson = findLesson(course, lessonId);
  if (!lesson) return;
  // Title
  $('lesson-title').textContent = lesson.title;
  // Video
  const vw = $('video-wrap');
  const nv = $('no-video');
  // Remove old iframe if any
  const oldIframe = vw.querySelector('iframe');
  if (oldIframe) oldIframe.remove();
  if (lesson.youtubeId) {
    nv.style.display = 'none';
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${lesson.youtubeId}?rel=0&modestbranding=1&disablekb=0&iv_load_policy=3`;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    vw.appendChild(iframe);
  } else {
    nv.style.display = 'flex';
  }
  // Watch button
  updateWatchBtn();
  // Documents
  const dl = $('doc-list');
  dl.innerHTML = '';
  if (lesson.documents && lesson.documents.length) {
    lesson.documents.forEach(doc => {
      const card = document.createElement('div');
      card.className = 'doc-card';
      card.innerHTML = `<span>📎 ${doc.title}</span><a href="${doc.url}" target="_blank" class="btn btn-outline btn-sm">Mở</a>`;
      dl.appendChild(card);
    });
  } else {
    dl.innerHTML = '<p style="font-size:.85rem;color:var(--gray)">Không có tài liệu</p>';
  }
}
function updateWatchBtn() {
  const btn = $('btn-watch');
  const status = $('watch-status');
  if (!btn) return;
  const watched = !!progress[currentLessonId];
  btn.textContent = watched ? '✓ Đã xem' : 'Đánh dấu đã xem';
  btn.className = 'btn-watch' + (watched ? ' watched' : '');
  status.textContent = '';
}
async function toggleWatch() {
  if (!currentLessonId || !currentCourseId) return;
  const newVal = !progress[currentLessonId];
  progress[currentLessonId] = newVal;
  updateWatchBtn();
  await saveProgress(currentLessonId, currentCourseId, newVal);
}
// ── Admin ──
function toggleAdmin() {
  $('admin-panel').classList.toggle('open');
  if ($('admin-panel').classList.contains('open')) loadAdminData();
}
async function loadAdminData() {
  // Whitelist
  const wl = $('whitelist-list');
  wl.innerHTML = 'Đang tải...';
  try {
    const snap = await db.collection('whitelist').get();
    if (snap.empty) { wl.innerHTML = '<i>Chưa có ai</i>'; }
    else {
      wl.innerHTML = '';
      snap.forEach(doc => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:2px 0';
        row.innerHTML = `<span>${doc.id}</span><button onclick="removeWhitelist('${doc.id}')"
          style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:.8rem">✕</button>`;
        wl.appendChild(row);
      });
    }
  } catch(e) { wl.innerHTML = 'Lỗi: ' + e.message; }
  // Security logs
  const sl = $('security-logs');
  sl.innerHTML = 'Đang tải...';
  try {
    const snap = await db.collection('security_logs').orderBy('time','desc').limit(10).get();
    if (snap.empty) { sl.innerHTML = '<span style="color:var(--green)">Không có truy cập trái phép</span>'; }
    else {
      sl.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        const t = d.time?.toDate?.()?.toLocaleString('vi-VN') || '—';
        const div = document.createElement('div');
        div.style.cssText = 'padding:2px 0;border-bottom:1px solid #fee2e2';
        div.textContent = `⚠ ${d.email} — ${t}`;
        sl.appendChild(div);
      });
    }
  } catch(e) { sl.innerHTML = 'Lỗi: ' + e.message; }
}
async function addWhitelist() {
  const input = $('whitelist-input');
  const email = input.value.trim().toLowerCase();
  if (!email || !email.includes('@')) { alert('Email không hợp lệ'); return; }
  await db.collection('whitelist').doc(email).set({ addedAt: firebase.firestore.FieldValue.serverTimestamp() });
  input.value = '';
  loadAdminData();
}
async function removeWhitelist(email) {
  if (!confirm(`Xoá quyền của ${email}?`)) return;
  await db.collection('whitelist').doc(email).delete();
  loadAdminData();
}
document.addEventListener('click', e => {
  if (!$('admin-panel').contains(e.target) && e.target !== $('btn-admin')) {
    $('admin-panel').classList.remove('open');
  }
});
async function triggerSync(e) {
  const btn = e.target;
  btn.disabled = true;
  btn.textContent = 'Đang sync...';
  try {
    const r = await fetch(SYNC_PROXY_URL, {
      method: 'POST',
      headers: { 'x-secret': SYNC_SECRET }
    });
    if (r.status === 204) {
      alert('✓ Đã trigger sync! GitHub Actions sẽ chạy trong vài giây.');
    } else if (r.status === 429) {
      alert('⏳ Vừa sync xong, chờ 1 phút trước khi sync lại.');
    } else {
      alert('Lỗi: ' + r.status + '. Kiểm tra Cloudflare Worker.');
    }
  } catch(e) {
    alert('Lỗi kết nối: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '🔄 Sync ngay';
}
